
<!DOCTYPE html>
<html>
<head>
    <title>Registration Form</title>
    
    <style>
        body{
            background-image: url(registimage.jpeg);
            background-size: cover;
        }
        .container {
            width: 300px;
            padding: 16px;
            background-color: white;
            margin: 0 auto;
            margin-top: 100px;
            border: 1px solid black;
            border-radius: 4px;
        }
        input[type=text], input[type=password] {
            width: 100%;
            padding: 12px 20px;
            margin: 8px 0 ;
            border: none;
            background: #f1f1f1;
            box-sizing: border-box;
        }
        input[type=submit] {
            background-color: #4CAF50;
            color: white;
            padding: 14px 20px;
            margin: 8px 0;
            border: none;
            cursor: pointer;
            width: 100%;
        }
    </style>
</head>
<body>

<div class="container">
    <label for="uname"><b>Username</b></label>
    <input type="text" placeholder="Enter Username" name="uname" required>
    
    <label for="uname"><b>Mobile no.</b></label>
    <input type="text" placeholder="mobile no." name="uname" required>
    
    
    <label for="psw"><b>Password</b></label>
    <input type="password" placeholder="Enter Password" name="psw" required>

    <label for="psw-repeat"><b>Confirm Password</b></label>
    <input type="password" placeholder="Re-enter Password" name="psw-repeat" required>

    <input type="submit" value="Register">
</div>

</body>
</html>
